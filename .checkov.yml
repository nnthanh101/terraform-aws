# Root Checkov config — applies to all 12 modules
# Merged from upstream: aws-samples + cloudposse patterns
#
# Usage:
#   checkov -d modules/<name> --config-file .checkov.yml

download-external-modules: false
evaluate-variables: true
directory:
  - ./
framework:
  - terraform
skip-check:
  # Cross-cloud: skip GCP/Azure checks (AWS-only repo)
  - CKV2_GCP*
  - CKV_AZURE*
  - CKV2_AZURE*
  # Module source pinning: uses version constraint per ADR-003, not git hash
  - CKV_TF_1
  # ALB module: security group attachment managed internally
  - CKV2_AWS_5
  # ALB module: drop_invalid_header_fields set in main.tf but Checkov may not trace through wrapper
  - CKV_AWS_131
  # --- Module-level skips: consumer decides security posture, not the building block ---
  # S3: bucket logging, versioning, MFA delete, public access — consumer configures
  - CKV_AWS_18   # S3 logging (consumer decision)
  - CKV_AWS_19   # S3 SSE (module exposes variable, consumer decides)
  - CKV_AWS_21   # S3 versioning (consumer decision)
  - CKV_AWS_144  # S3 cross-region replication (consumer decision)
  - CKV_AWS_145  # S3 KMS encryption (module supports, consumer enables)
  - CKV2_AWS_6   # S3 public access block (module exposes variable)
  - CKV2_AWS_61  # S3 lifecycle configuration (consumer decision)
  - CKV2_AWS_62  # S3 event notifications (consumer decision)
  - CKV_AWS_53   # S3 block public ACLs (consumer configures)
  - CKV_AWS_54   # S3 block public policy (consumer configures)
  - CKV_AWS_55   # S3 ignore public ACLs (consumer configures)
  - CKV_AWS_56   # S3 restrict public buckets (consumer configures)
  # KMS: key rotation, policy — consumer configures
  - CKV_AWS_7    # KMS rotation (module exposes variable)
  - CKV_AWS_227  # KMS policy (consumer decision)
  # ECS: IAM policy wildcards + log retention — module provides sensible defaults
  - CKV_AWS_111  # IAM write without constraint (ECS task exec role needs ecr:*)
  - CKV_AWS_356  # IAM * resource (ECS task exec needs broad ECR/logs)
  - CKV_AWS_338  # CloudWatch log retention (consumer sets retention)
  # CloudFront: viewer protocol, TLS, response headers — consumer configures
  - CKV_AWS_34   # CloudFront viewer protocol (module variable)
  - CKV_AWS_174  # CloudFront TLS 1.2 (module variable)
  - CKV_AWS_216  # CloudFront enabled (module variable)
  - CKV_AWS_259  # CloudFront HSTS header (consumer adds response policy)
  - CKV2_AWS_32  # CloudFront response header policy (consumer attaches)
  - CKV2_AWS_47  # CloudFront WAF Log4j (consumer attaches WAF)
  # ACM: Route53 DNSSEC + query logging — infra-level, not module-level
  - CKV2_AWS_38  # Route53 DNSSEC (infra-level decision)
  - CKV2_AWS_39  # Route53 query logging (infra-level decision)
  - CKV2_AWS_71  # ACM wildcard cert (legitimate use case)
  # WAF: web ACL logging — consumer configures
  - CKV_AWS_97   # WAF logging (consumer configures)
  - CKV_AWS_192  # WAF rules (consumer configures)
  # EFS: encryption — module exposes variable
  - CKV_AWS_42   # EFS encryption (module exposes kms_key_id variable)
  - CKV_AWS_148  # EFS backup policy (consumer decision)
  # VPC: flow logs, NACL — consumer configures
  - CKV2_AWS_11  # VPC flow logs (module exposes variable)
  - CKV2_AWS_12  # VPC default SG (consumer configures)
  - CKV2_AWS_19  # VPC verified access (consumer decision)
  # ECS: container insights — consumer configures
  - CKV_AWS_65   # ECS cluster container insights (consumer decision)
  # ALB examples: EC2 instance checks in example code, not module code
  - CKV_AWS_8    # EC2 EBS encryption (example instances)
  - CKV_AWS_79   # EC2 IMDSv2 (example instances)
  - CKV_AWS_126  # EC2 detailed monitoring (example instances)
  - CKV_AWS_135  # EC2 EBS optimized (example instances)
  # S3: SQS encryption in notification queue — consumer configures
  - CKV_AWS_27   # SQS encryption (S3 notification queue, consumer decision)
  # ALB: access logging + WAF — consumer configures
  - CKV_AWS_91   # ALB access logging (consumer decision)
  - CKV_AWS_150  # ALB deletion protection (consumer decision)
  - CKV_AWS_152  # ALB drop invalid headers (consumer decision)
  - CKV_AWS_103  # ALB target HTTPS (consumer decision)
  - CKV_AWS_2    # ALB listener HTTPS (consumer configures)
  - CKV2_AWS_41  # ALB target response time (consumer decision)
  - CKV2_AWS_76  # ALB WAF attachment (consumer decision)
  # Misc
  - CKV_AWS_158  # CloudWatch log encryption (consumer provides KMS key)
  - CKV_AWS_224  # AWS Backup (consumer decision)
  - CKV_AWS_300  # Ensure resource policy (consumer attaches)
  - CKV2_AWS_64  # Secrets Manager rotation (consumer configures)
  - CKV2_AWS_65  # Secrets Manager replication (consumer configures)
summary-position: bottom
output: cli
compact: true
quiet: true
