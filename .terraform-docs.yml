# Root terraform-docs config — applies to all 12 modules
# Merged from upstream: terraform-aws-modules + aws-ia patterns
#
# Usage:
#   terraform-docs -c .terraform-docs.yml modules/<name>
#   terraform-docs -c .terraform-docs.yml modules/<name> > modules/<name>/README.md

formatter: markdown table

header-from: .header.md

content: |-
  {{ .Header }}

  ## Requirements

  {{ .Requirements }}

  ## Providers

  {{ .Providers }}

  ## Resources

  {{ .Resources }}

  ## Inputs

  {{ .Inputs }}

  ## Outputs

  {{ .Outputs }}

output:
  file: README.md
  mode: replace

sort:
  enabled: true
  by: required

settings:
  anchor: true
  color: true
  default: true
  escape: true
  html: true
  indent: 2
  required: true
  sensitive: true
  type: true
