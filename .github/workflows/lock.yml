# Merged from upstream: terraform-aws-modules lock.yml pattern
# Lock closed issues/PRs to prevent spam comments

name: Lock Closed Threads

on:
  schedule:
    - cron: "50 1 * * *"  # Daily 1:50 AM UTC (offset from stale job)
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  lock:
    name: Lock inactive resolved items
    runs-on: ubuntu-latest
    steps:
      - uses: dessant/lock-threads@v5
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          issue-inactive-days: 30
          pr-inactive-days: 30
          issue-lock-reason: resolved
          pr-lock-reason: resolved
          exclude-issue-labels: "on-hold,discussion"
          exclude-pr-labels: "on-hold"
          log-output: true
