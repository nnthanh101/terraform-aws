name: Registry Publish

on:
  push:
    tags:
      - '*/v*'    # module-prefixed: iam-identity-center/v1.2.0, ecs/v0.1.0
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g., iam-identity-center/v1.1.3)'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: registry-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve Module from Tag
    runs-on: ubuntu-latest
    outputs:
      module: ${{ steps.module-info.outputs.module }}
      version: ${{ steps.module-info.outputs.version }}
      module_dir: ${{ steps.module-info.outputs.module_dir }}
      tag_ref: ${{ steps.module-info.outputs.tag_ref }}
      checkout_ref: ${{ steps.module-info.outputs.checkout_ref }}
    steps:
      - name: Extract module info from tag
        id: module-info
        env:
          INPUT_TAG: ${{ inputs.tag }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          # Strict format validation: MODULE/vX.Y.Z (kebab-case module name)
          if [[ "$TAG" =~ ^([a-z][a-z0-9-]+)/v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            MODULE_NAME="${BASH_REMATCH[1]}"
            MODULE_VERSION="v${BASH_REMATCH[2]}"
          else
            echo "FAIL: Tag '$TAG' does not match MODULE/vX.Y.Z format (e.g., ecs/v0.1.0)" && exit 1
          fi
          echo "module=${MODULE_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${MODULE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "module_dir=modules/${MODULE_NAME}" >> "$GITHUB_OUTPUT"
          # Normalize to refs/tags/ prefix for actions/checkout compatibility
          echo "tag_ref=refs/tags/${TAG}" >> "$GITHUB_OUTPUT"
          # checkout_ref: tag push → tag ref (immutable); workflow_dispatch → HEAD (latest fixes)
          if [ "$EVENT_NAME" = "push" ]; then
            echo "checkout_ref=refs/tags/${TAG}" >> "$GITHUB_OUTPUT"
            echo "Resolved: module=${MODULE_NAME}, version=${MODULE_VERSION}, checkout=refs/tags/${TAG} (tag push — immutable)"
          else
            echo "checkout_ref=" >> "$GITHUB_OUTPUT"
            echo "Resolved: module=${MODULE_NAME}, version=${MODULE_VERSION}, checkout=HEAD (workflow_dispatch — latest main)"
          fi

  validate:
    name: Validate & Lint (${{ needs.resolve.outputs.module }})
    needs: [resolve]
    runs-on: ubuntu-latest
    container:
      image: nnthanh101/terraform:2.6.0@sha256:3e159226f661171fb26baa360af7ddc0809076376a3cd6c37b8614186770f16a
      options: --user 0
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.checkout_ref || github.sha }}

      - name: Quick CI (fmt + validate + lint + legal)
        env:
          MODULE: ${{ needs.resolve.outputs.module }}
          MODULE_DIR: ${{ needs.resolve.outputs.module_dir }}
        run: task ci:quick

  test:
    name: Tier 1 Snapshot Tests (${{ needs.resolve.outputs.module }})
    needs: [resolve, validate]
    runs-on: ubuntu-latest
    container:
      image: nnthanh101/terraform:2.6.0@sha256:3e159226f661171fb26baa360af7ddc0809076376a3cd6c37b8614186770f16a
      options: --user 0
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.checkout_ref || github.sha }}

      - name: Run Tier 1 tests (snapshot tests, $0 cost)
        env:
          MODULE: ${{ needs.resolve.outputs.module }}
          MODULE_NAME: ${{ needs.resolve.outputs.module }}
          MODULE_DIR: ${{ needs.resolve.outputs.module_dir }}
        run: |
          set -o pipefail
          mkdir -p "tmp/terraform-aws/registry-publish/${MODULE_NAME}"
          task test:tier1 2>&1 | tee "tmp/terraform-aws/registry-publish/${MODULE_NAME}/tier1-snapshot.log"
          TEST_EXIT=$?
          echo "exit_code=${TEST_EXIT}" >> "tmp/terraform-aws/registry-publish/${MODULE_NAME}/tier1-summary.txt"
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "tmp/terraform-aws/registry-publish/${MODULE_NAME}/tier1-summary.txt"
          echo "module=${MODULE_NAME}" >> "tmp/terraform-aws/registry-publish/${MODULE_NAME}/tier1-summary.txt"
          echo "tag=${GITHUB_REF_NAME:-unknown}" >> "tmp/terraform-aws/registry-publish/${MODULE_NAME}/tier1-summary.txt"
          exit $TEST_EXIT

      - name: Upload test evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ needs.resolve.outputs.module }}
          path: tmp/terraform-aws/registry-publish/${{ needs.resolve.outputs.module }}/

  release:
    name: Create GitHub Release (${{ needs.resolve.outputs.module }} ${{ needs.resolve.outputs.version }})
    needs: [resolve, test]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create release (idempotent — skip if exists)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MODULE_NAME: ${{ needs.resolve.outputs.module }}
          MODULE_VERSION: ${{ needs.resolve.outputs.version }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          RELEASE_TITLE="${MODULE_NAME} ${MODULE_VERSION}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — skipping"
          else
            gh release create "$TAG" --generate-notes --title "${RELEASE_TITLE}"
          fi

  publish:
    name: Publish to TFC (${{ needs.resolve.outputs.module }} ${{ needs.resolve.outputs.version }})
    needs: [resolve, test, release]
    if: always() && needs.test.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.checkout_ref || github.sha }}

      - name: Create clean module tarball
        env:
          MODULE_DIR: ${{ needs.resolve.outputs.module_dir }}
        run: |
          # Validate module directory is within modules/ boundary
          CANONICAL_DIR="$(realpath "${MODULE_DIR}")"
          EXPECTED_PREFIX="$(realpath modules)"
          if [[ "$CANONICAL_DIR" != "$EXPECTED_PREFIX/"* ]]; then
            echo "ERROR: MODULE_DIR escapes modules/ boundary: ${MODULE_DIR}"
            exit 1
          fi
          tar -czf /tmp/module.tar.gz \
            --exclude='.terraform' \
            --exclude='.terraform.lock.hcl' \
            --exclude='.config' \
            --exclude='.project_automation' \
            --exclude='.pre-commit-config.yaml' \
            --exclude='.copier-answers.yml' \
            --exclude='.project_config.yml' \
            --exclude='.checkov.yml' \
            -C "${MODULE_DIR}" .

      - name: Pre-flight module check
        id: preflight
        env:
          TFE_TOKEN: ${{ secrets.TFE_TOKEN }}
          MODULE_NAME: ${{ needs.resolve.outputs.module }}
        run: |
          mkdir -p /tmp/publish-evidence
          # Check module exists and detect VCS vs API-only mode
          MODULE_RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer ${TFE_TOKEN}" \
            "https://app.terraform.io/api/v2/organizations/oceansoft/registry-modules/private/oceansoft/${MODULE_NAME}/aws")
          HTTP_CODE=$(echo "$MODULE_RESPONSE" | tail -1)
          BODY=$(echo "$MODULE_RESPONSE" | sed '$d')
          if [ "$HTTP_CODE" = "404" ]; then
            echo "ERROR: Module '${MODULE_NAME}' not found in TFC registry."
            echo "HITL action required: Create the module in TFC console:"
            echo "  Registry → Publish Module → No VCS connection → org: oceansoft, name: ${MODULE_NAME}, provider: aws"
            exit 1
          fi
          echo "$BODY" > /tmp/publish-evidence/preflight-module.json
          # Detect VCS connection via vcs-repo attribute (reliable, not error-string matching)
          VCS_REPO=$(echo "$BODY" | jq -r '.data.attributes."vcs-repo" // empty')
          if [ -n "$VCS_REPO" ] && [ "$VCS_REPO" != "null" ]; then
            echo "ERROR: Module '${MODULE_NAME}' is VCS-connected — API upload is blocked by TFC."
            echo "HITL action required: Delete and re-create as API-only module:"
            echo "  1. TFC Console → Registry → ${MODULE_NAME}/aws → Settings → Delete Module"
            echo "  2. Registry → Publish Module → No VCS connection → org: oceansoft, name: ${MODULE_NAME}, provider: aws"
            echo "  3. Re-run this workflow after re-creation"
            echo "vcs_connected=true" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "Pre-flight OK: module '${MODULE_NAME}' exists, API-only mode confirmed"
          echo "vcs_connected=false" >> "$GITHUB_OUTPUT"

      - name: Create TFC module version
        id: create-version
        env:
          TFE_TOKEN: ${{ secrets.TFE_TOKEN }}
          MODULE_NAME: ${{ needs.resolve.outputs.module }}
          MODULE_VERSION: ${{ needs.resolve.outputs.version }}
        run: |
          VERSION="${MODULE_VERSION#v}"
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer ${TFE_TOKEN}" \
            -H "Content-Type: application/vnd.api+json" \
            -d "{\"data\":{\"type\":\"registry-module-versions\",\"attributes\":{\"version\":\"${VERSION}\"}}}" \
            "https://app.terraform.io/api/v2/organizations/oceansoft/registry-modules/private/oceansoft/${MODULE_NAME}/aws/versions")
          UPLOAD_URL=$(echo "$RESPONSE" | jq -r '.data.links.upload')
          if [ "$UPLOAD_URL" = "null" ] || [ -z "$UPLOAD_URL" ]; then
            API_ERROR=$(echo "$RESPONSE" | jq -r '.errors[0].detail // "unknown"' 2>/dev/null)
            echo "ERROR: Failed to create version — API error: ${API_ERROR}"
            exit 1
          fi
          echo "::add-mask::${UPLOAD_URL}"
          echo "upload_url=${UPLOAD_URL}" >> "$GITHUB_OUTPUT"
          echo "Created version ${VERSION}, upload URL obtained"
          mkdir -p /tmp/publish-evidence
          echo "$RESPONSE" > /tmp/publish-evidence/create-version-response.json

      - name: Upload module to TFC
        env:
          UPLOAD_URL: ${{ steps.create-version.outputs.upload_url }}
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X PUT -H "Content-Type: application/octet-stream" \
            --data-binary @/tmp/module.tar.gz \
            "$UPLOAD_URL")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: Upload failed with HTTP ${HTTP_CODE}"
            exit 1
          fi
          echo "Upload successful (HTTP ${HTTP_CODE})"

      - name: Verify TFC ingestion
        env:
          TFE_TOKEN: ${{ secrets.TFE_TOKEN }}
          MODULE_NAME: ${{ needs.resolve.outputs.module }}
          MODULE_VERSION: ${{ needs.resolve.outputs.version }}
        run: |
          VERSION="${MODULE_VERSION#v}"
          # 8x10s=80s polling — multi-submodule modules (e.g. ECS with 4 submodules) need longer ingestion
          for i in 1 2 3 4 5 6 7 8; do
            sleep 10
            STATUS=$(curl -s \
              -H "Authorization: Bearer ${TFE_TOKEN}" \
              "https://app.terraform.io/api/v2/organizations/oceansoft/registry-modules/private/oceansoft/${MODULE_NAME}/aws" \
              | jq -r ".data.attributes.\"version-statuses\"[] | select(.version==\"${VERSION}\") | .status")
            echo "Attempt ${i}/8: version ${VERSION} status = ${STATUS}"
            if [ "$STATUS" = "ok" ]; then
              echo "TFC Registry publish verified: ${MODULE_NAME} v${VERSION}"
              curl -s \
                -H "Authorization: Bearer ${TFE_TOKEN}" \
                "https://app.terraform.io/api/v2/organizations/oceansoft/registry-modules/private/oceansoft/${MODULE_NAME}/aws" \
                > /tmp/publish-evidence/verify-status.json
              exit 0
            fi
            if [ "$STATUS" = "error" ]; then
              echo "ERROR: Version ${VERSION} ingestion failed with status 'error'"
              curl -s \
                -H "Authorization: Bearer ${TFE_TOKEN}" \
                "https://app.terraform.io/api/v2/organizations/oceansoft/registry-modules/private/oceansoft/${MODULE_NAME}/aws" \
                > /tmp/publish-evidence/verify-status.json
              exit 1
            fi
          done
          echo "ERROR: Version ${VERSION} did not reach 'ok' status after 80s (8 attempts)"
          exit 1

      - name: Upload publish evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publish-evidence-${{ needs.resolve.outputs.module }}-${{ needs.resolve.outputs.version }}
          path: /tmp/publish-evidence/
