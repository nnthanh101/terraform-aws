name: Release Please

on:
  push:
    branches: [main]
  pull_request_target:
    types: [opened, edited, synchronize]

permissions:
  contents: read

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      # release-please v4 monorepo: output keys use package PATH (not component)
      # format: steps.release.outputs['<path>--<field>']
      iam_tag: ${{ steps.release.outputs['modules/iam-identity-center--tag_name'] }}
      ecs_tag: ${{ steps.release.outputs['modules/ecs--tag_name'] }}
      web_tag: ${{ steps.release.outputs['modules/fullstack-web--tag_name'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Log release outputs
        if: always()
        env:
          RP_RELEASES_CREATED: ${{ steps.release.outputs.releases_created }}
          RP_IAM_TAG: ${{ steps.release.outputs['modules/iam-identity-center--tag_name'] }}
          RP_IAM_VERSION: ${{ steps.release.outputs['modules/iam-identity-center--version'] }}
          RP_IAM_CREATED: ${{ steps.release.outputs['modules/iam-identity-center--release_created'] }}
          RP_ECS_TAG: ${{ steps.release.outputs['modules/ecs--tag_name'] }}
          RP_ECS_VERSION: ${{ steps.release.outputs['modules/ecs--version'] }}
          RP_WEB_TAG: ${{ steps.release.outputs['modules/fullstack-web--tag_name'] }}
          RP_WEB_VERSION: ${{ steps.release.outputs['modules/fullstack-web--version'] }}
        run: |
          mkdir -p tmp/terraform-aws/release-logs
          jq -n \
            --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg run_id "${GITHUB_RUN_ID}" \
            --arg sha "${GITHUB_SHA}" \
            --arg releases "$RP_RELEASES_CREATED" \
            --arg iam_tag "$RP_IAM_TAG" \
            --arg iam_ver "$RP_IAM_VERSION" \
            --arg iam_created "$RP_IAM_CREATED" \
            --arg ecs_tag "$RP_ECS_TAG" \
            --arg ecs_ver "$RP_ECS_VERSION" \
            --arg web_tag "$RP_WEB_TAG" \
            --arg web_ver "$RP_WEB_VERSION" \
            '{timestamp: $ts, run_id: $run_id, sha: $sha, releases_created: $releases,
              iam_identity_center: {tag: $iam_tag, version: $iam_ver, release_created: $iam_created},
              ecs: {tag: $ecs_tag, version: $ecs_ver},
              fullstack_web: {tag: $web_tag, version: $web_ver}}' \
            > "tmp/terraform-aws/release-logs/release-please-${GITHUB_RUN_ID}.json"

      - name: Upload release evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-please-${{ github.run_id }}
          path: tmp/terraform-aws/release-logs/

  # Auto-trigger TFC publish for each module that got a release
  trigger-publish:
    name: Trigger TFC Publish
    needs: [release-please]
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Dispatch registry-publish for each released module
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IAM_TAG: ${{ needs.release-please.outputs.iam_tag }}
          ECS_TAG: ${{ needs.release-please.outputs.ecs_tag }}
          WEB_TAG: ${{ needs.release-please.outputs.web_tag }}
        run: |
          DISPATCHED=0
          for TAG in "$IAM_TAG" "$ECS_TAG" "$WEB_TAG"; do
            if [ -n "$TAG" ]; then
              echo "Dispatching registry-publish for: ${TAG}"
              gh workflow run registry-publish.yml \
                --repo "${{ github.repository }}" \
                --ref main \
                -f tag="${TAG}"
              echo "Dispatched: ${TAG}"
              DISPATCHED=$((DISPATCHED + 1))
            fi
          done
          if [ "$DISPATCHED" -eq 0 ]; then
            echo "ERROR: releases_created=true but no tags found. Output keys may be wrong."
            echo "IAM_TAG='${IAM_TAG}' ECS_TAG='${ECS_TAG}' WEB_TAG='${WEB_TAG}'"
            exit 1
          fi
          echo "Total dispatched: ${DISPATCHED}"

  validate-pr-title:
    name: Validate PR Title
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request_target'
    permissions:
      pull-requests: read
      statuses: write
    steps:
      - uses: amannn/action-semantic-pull-request@v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            fix
            feat
            docs
            ci
            chore
            perf
            refactor
            security
            test
          requireScope: false
          subjectPattern: ^[A-Z].+$
          subjectPatternError: |
            The subject "{subject}" found in the pull request title "{title}"
            didn't match the configured pattern. Please ensure that the subject
            starts with an uppercase character.
          wip: true
          validateSingleCommit: false
