# Unified versioning: single root vX.Y.Z tag for all 12 modules (ADR-026)

name: Release Please

on:
  push:
    branches: [main]
  pull_request_target:
    types: [opened, edited, synchronize]

permissions:
  contents: read

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    if: github.event_name == 'push'
    outputs:
      release_created: ${{ steps.release.outputs['release_created'] }}
      tag_name: ${{ steps.release.outputs['tag_name'] }}
      version: ${{ steps.release.outputs['version'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Log release outputs
        if: always()
        env:
          RP_RELEASE_CREATED: ${{ steps.release.outputs.release_created }}
          RP_TAG: ${{ steps.release.outputs.tag_name }}
          RP_VERSION: ${{ steps.release.outputs.version }}
        run: |
          mkdir -p tmp/terraform-aws/release-logs
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          cat <<EOFLOG > tmp/terraform-aws/release-logs/release-please-${{ github.run_id }}.json
          {
            "timestamp": "${TIMESTAMP}",
            "run_id": "${{ github.run_id }}",
            "sha": "${{ github.sha }}",
            "release_created": "${RP_RELEASE_CREATED}",
            "tag_name": "${RP_TAG}",
            "version": "${RP_VERSION}",
            "versioning": "unified (ADR-026)"
          }
          EOFLOG

      - name: Upload release evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-please-${{ github.run_id }}
          path: tmp/terraform-aws/release-logs/

  validate-pr-title:
    name: Validate PR Title
    runs-on: ubuntu-latest
    permissions:
      statuses: write
      pull-requests: read
    if: github.event_name == 'pull_request_target'
    steps:
      - uses: amannn/action-semantic-pull-request@v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            fix
            feat
            docs
            ci
            chore
            perf
            refactor
            security
            test
          requireScope: false
          subjectPattern: ^[A-Z].+$
          subjectPatternError: |
            The subject "{subject}" found in the pull request title "{title}"
            didn't match the configured pattern. Please ensure that the subject
            starts with an uppercase character.
          wip: true
          validateSingleCommit: false
