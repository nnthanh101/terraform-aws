# Unified versioning: single root vX.Y.Z tag for all 12 modules (ADR-026)

name: Release Please

on:
  push:
    branches: [main]
  pull_request_target:
    types: [opened, edited, synchronize]

permissions:
  contents: read

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    if: github.event_name == 'push'
    outputs:
      release_created: ${{ steps.release.outputs['release_created'] }}
      tag_name: ${{ steps.release.outputs['tag_name'] }}
      version: ${{ steps.release.outputs['version'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Log release outputs
        if: always()
        env:
          RP_RELEASE_CREATED: ${{ steps.release.outputs.release_created }}
          RP_TAG: ${{ steps.release.outputs.tag_name }}
          RP_VERSION: ${{ steps.release.outputs.version }}
        run: |
          mkdir -p tmp/terraform-aws/release-logs
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          cat <<EOFLOG > tmp/terraform-aws/release-logs/release-please-${{ github.run_id }}.json
          {
            "timestamp": "${TIMESTAMP}",
            "run_id": "${{ github.run_id }}",
            "sha": "${{ github.sha }}",
            "release_created": "${RP_RELEASE_CREATED}",
            "tag_name": "${RP_TAG}",
            "version": "${RP_VERSION}",
            "versioning": "unified (ADR-026)"
          }
          EOFLOG

      - name: Upload release evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-please-${{ github.run_id }}
          path: tmp/terraform-aws/release-logs/

  # Auto-publish all modules to TFC Private Registry after a release
  registry-sync:
    name: Registry Sync (all modules)
    needs: [release-please]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 2
    steps:
      - uses: actions/checkout@v4

      - name: Register missing modules (idempotent)
        env:
          TFE_TOKEN: ${{ secrets.TFE_TOKEN }}
          MODULE: all
        run: bash scripts/registry-create.sh

      - name: Publish all modules at ${{ needs.release-please.outputs.version }}
        env:
          TFE_TOKEN: ${{ secrets.TFE_TOKEN }}
          VERSION: ${{ needs.release-please.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Publishing all modules at v${VERSION} to TFC Private Registry..."
          PASS=0
          FAIL=0
          for MODULE_DIR in modules/*/; do
            MOD_NAME=$(basename "$MODULE_DIR")
            # Skip modules without .tf files
            ls "${MODULE_DIR}"*.tf >/dev/null 2>&1 || continue
            echo ""
            echo "=== Publishing ${MOD_NAME} v${VERSION} ==="
            # Dispatch registry-publish workflow for each module
            gh workflow run registry-publish.yml \
              -f tag="${MOD_NAME}/v${VERSION}" \
              && { echo "  Dispatched: ${MOD_NAME}/v${VERSION}"; PASS=$((PASS + 1)); } \
              || { echo "  FAIL: ${MOD_NAME}"; FAIL=$((FAIL + 1)); }
            # Rate limit: avoid GitHub API throttling
            sleep 5
          done
          echo ""
          echo "Registry sync: dispatched=${PASS} failed=${FAIL}"
          if [ "$FAIL" -gt 0 ]; then
            echo "WARN: ${FAIL} modules failed to dispatch — check Actions tab"
          fi

  validate-pr-title:
    name: Validate PR Title
    runs-on: ubuntu-latest
    permissions:
      statuses: write
      pull-requests: read
    if: github.event_name == 'pull_request_target'
    steps:
      - uses: amannn/action-semantic-pull-request@v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            fix
            feat
            docs
            ci
            chore
            perf
            refactor
            security
            test
          requireScope: false
          subjectPattern: ^[A-Z].+$
          subjectPatternError: |
            The subject "{subject}" found in the pull request title "{title}"
            didn't match the configured pattern. Please ensure that the subject
            starts with an uppercase character.
          wip: true
          validateSingleCommit: false
