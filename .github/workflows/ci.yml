name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    name: Validate & Lint (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [sso, ecs, web, acm, alb, cloudfront, s3, vpc, efs, kms, waf, sftp]
    container:
      image: nnthanh101/terraform:2.6.0@sha256:3e159226f661171fb26baa360af7ddc0809076376a3cd6c37b8614186770f16a
      options: --user 0
    steps:
      - uses: actions/checkout@v5

      - name: Terraform fmt + validate
        env:
          MODULE: ${{ matrix.module }}
          MODULE_DIR: modules/${{ matrix.module }}
        run: task build:validate

      - name: Lint (tflint + checkov)
        env:
          MODULE: ${{ matrix.module }}
          MODULE_DIR: modules/${{ matrix.module }}
        run: task build:lint

  legal:
    name: Legal Audit
    runs-on: ubuntu-latest
    container:
      image: nnthanh101/terraform:2.6.0@sha256:3e159226f661171fb26baa360af7ddc0809076376a3cd6c37b8614186770f16a
      options: --user 0
    steps:
      - uses: actions/checkout@v5

      - name: Apache 2.0 compliance (5 checks)
        run: task govern:legal

      - name: Upload legal evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: legal-audit
          path: tmp/terraform-aws/legal-audit/

  governance:
    name: Governance Score
    runs-on: ubuntu-latest
    container:
      image: nnthanh101/terraform:2.6.0@sha256:3e159226f661171fb26baa360af7ddc0809076376a3cd6c37b8614186770f16a
      options: --user 0
    steps:
      - uses: actions/checkout@v5

      - name: Constitutional checkpoint (>=85%)
        run: task govern:score

      - name: APRA CPS 234 compliance (Para 15/36/37)
        run: task govern:cps234

      - name: Upload governance evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: governance-score
          path: |
            tmp/terraform-aws/governance/
            tmp/terraform-aws/test-results/

  naming:
    name: Naming Convention Audit (ADR-011)
    runs-on: ubuntu-latest
    container:
      image: nnthanh101/terraform:2.6.0@sha256:3e159226f661171fb26baa360af7ddc0809076376a3cd6c37b8614186770f16a
      options: --user 0
    steps:
      - uses: actions/checkout@v5

      - name: ADR-011 naming convention (5 layers)
        run: task govern:naming

      - name: Upload naming evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: naming-audit
          path: tmp/terraform-aws/governance/naming-audit-*.json

  validate-projects:
    name: Validate Projects (${{ matrix.project }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [sso, ecs]
    container:
      image: nnthanh101/terraform:2.6.0@sha256:3e159226f661171fb26baa360af7ddc0809076376a3cd6c37b8614186770f16a
      options: --user 0
    steps:
      - uses: actions/checkout@v5
        with:

      - name: terraform fmt -check
        run: terraform fmt -check projects/${{ matrix.project }}

      - name: terraform init + validate (local source override for CI)
        run: |
          # Override GitHub source to local path (tag may not exist yet pre-release)
          sed -i 's|source = "github.com/nnthanh101/terraform-aws//modules/\([^?]*\)?ref=[^"]*"|source = "../../modules/\1"|g' \
            projects/${{ matrix.project }}/main.tf
          terraform -chdir=projects/${{ matrix.project }} init -backend=false -input=false
          terraform -chdir=projects/${{ matrix.project }} validate

  test:
    name: CI-Safe Tests (Tier 1 + 2, no AWS cost)
    needs: [validate]
    runs-on: ubuntu-latest
    container:
      image: nnthanh101/terraform:2.6.0@sha256:3e159226f661171fb26baa360af7ddc0809076376a3cd6c37b8614186770f16a
      options: --user 0
    steps:
      - uses: actions/checkout@v5
        with:

      - name: Run CI test suite (no HITL gate)
        run: task test:ci

  lock-verify:
    name: Lock File Verification
    runs-on: ubuntu-latest
    container:
      image: nnthanh101/terraform:2.6.0@sha256:3e159226f661171fb26baa360af7ddc0809076376a3cd6c37b8614186770f16a
      options: --user 0
    steps:
      - uses: actions/checkout@v5
        with:

      - name: Generate lock files (gitignored — regenerate fresh in CI)
        run: |
          for dir in modules/*/; do
            if ls "$dir"*.tf 1>/dev/null 2>&1; then
              echo "==> terraform init: $dir"
              terraform -chdir="$dir" init -backend=false -input=false -upgrade 2>/dev/null
            fi
          done

      - name: Verify .terraform.lock.hcl exists per module
        run: task build:lock-verify

  security:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    container:
      image: nnthanh101/terraform:2.6.0@sha256:3e159226f661171fb26baa360af7ddc0809076376a3cd6c37b8614186770f16a
      options: --user 0
    steps:
      - uses: actions/checkout@v5
        with:

      - name: Trivy misconfig scan
        run: task security:trivy

      - name: Upload security evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: security-scan
          path: tmp/terraform-aws/security-scans/
