# Single-job README generation for all 12 modules (KISS: 1 commit, 1 push, no race condition)

name: Generate Module READMEs

on:
  push:
    branches: [main]
    paths:
      - "modules/**/*.tf"
      - ".terraform-docs.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-sync-${{ github.ref }}
  cancel-in-progress: true

jobs:
  terraform-docs:
    name: Generate All READMEs
    runs-on: ubuntu-latest
    container:
      image: nnthanh101/terraform:2.6.0@sha256:3e159226f661171fb26baa360af7ddc0809076376a3cd6c37b8614186770f16a
      options: --user 0
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Generate READMEs for all modules
        run: |
          # Install terraform-docs if not in container
          if ! command -v terraform-docs &>/dev/null; then
            TFDOCS_VERSION="0.19.0"
            curl -sSLo /tmp/terraform-docs.tar.gz \
              "https://github.com/terraform-docs/terraform-docs/releases/download/v${TFDOCS_VERSION}/terraform-docs-v${TFDOCS_VERSION}-linux-amd64.tar.gz"
            tar -xzf /tmp/terraform-docs.tar.gz -C /usr/local/bin terraform-docs
            chmod +x /usr/local/bin/terraform-docs
          fi

          CHANGED=0
          for MODULE_DIR in modules/*/; do
            MODULE_NAME=$(basename "$MODULE_DIR")
            # Skip modules without .tf files
            ls "${MODULE_DIR}"*.tf >/dev/null 2>&1 || continue
            echo "=== Generating README: ${MODULE_NAME} ==="
            terraform-docs markdown table \
              --config .terraform-docs.yml \
              --output-mode replace \
              --output-file README.md \
              "$MODULE_DIR"
          done

          # Check if any READMEs changed
          git diff --quiet modules/*/README.md && echo "No README changes detected" && exit 0

          # Configure git and commit all changes at once
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add modules/*/README.md
          git commit -m "docs: auto-generate module READMEs [skip ci]"
          git pull --rebase origin main
          git push origin main
